<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Consultorio Médico</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Estilos personalizados -->
  <style>
    body {
      background-image: url('fondo.png'); /* URL de la imagen de fondo */
      background-size: cover; /* Ajustar imagen al tamaño del contenedor */
      background-position: center; /* Centrar la imagen */
      background-repeat: no-repeat; /* No repetir la imagen */
      background-attachment: fixed; /* Fijar la imagen al fondo */
      background-color: #f8f9fa; /* Color de fondo de respaldo */
    }
    .card {
      border: 1px solid #d1d1d1; /* Borde de la tarjeta */
      border-radius: 10px; /* Esquinas redondeadas */
      box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1); /* Sombra */
    }
    .card-header {
      background-color: #cfcccc; /* Color de fondo del encabezado */
      color: white; /* Color de texto del encabezado */
      text-align: center; /* Centrado del texto */
      border-bottom: none; /* Sin borde inferior */
      border-top-left-radius: 10px; /* Esquina redondeada superior izquierda */
      border-top-right-radius: 10px; /* Esquina redondeada superior derecha */
      padding: 15px; /* Espaciado interno */
    }
    .card-body {
      padding: 20px; /* Espaciado interno */
    }
    .form-control {
      border: 1px solid #ced4da; /* Borde del campo de entrada */
    }
    .btn-primary {
      background-color: #007bff; /* Color de fondo del botón */
      border: none; /* Sin borde */
    }
    .btn-primary:hover {
      background-color: #0056b3; /* Color de fondo al pasar el mouse */
    }
  </style>
</head>
<body style="background-image: url('fondo.png');">

  <div class="container-fluid">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h3>Registro - Consultorio Médico</h3>
          </div>
          <div class="card-body">
            <form id="registroForm" action="registro_usuario.php" method="post">
              <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ingrese su nombre" required>
              </div>
              <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" class="form-control" placeholder="Ingrese sus apellidos" required>
              </div>
              <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" class="form-control" placeholder="Ingrese su correo electrónico" required>
              </div>
              <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="Ingrese su contraseña" required>
              </div>
              <button type="submit" class="btn btn-primary btn-block">Registrar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Éxito -->
  <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Registro Exitoso</h5>
        </div>
        <div class="modal-body">
          Su registro ha sido exitoso.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" id="successBtn">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS y dependencias opcionales (jQuery, Popper.js) -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <script>
    $(document).ready(function() {
      $('#registroForm').on('submit', function(event) {
        event.preventDefault();
        $.ajax({
          type: 'POST',
          url: 'registro_usuario.php',
          data: $(this).serialize(),
          success: function(response) {
            if (response.trim() === 'Registro exitoso') {
              $('#successModal').modal('show');
              $('#successBtn').on('click', function() {
                window.location.href = 'inicio_sesion.html';
              });
            } else {
              alert('Error: ' + response);
            }
          }
        });
      });
    });
  </script>
</body>
</html>
