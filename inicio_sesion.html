<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Consultorio Médico</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Estilos personalizados -->
  <style>
    body {
      background-image: url('fondo.png'); /* URL de la imagen de fondo */
      background-size: cover; /* Ajustar imagen al tamaño del contenedor */
      background-position: center; /* Centrar la imagen */
      background-repeat: no-repeat; /* No repetir la imagen */
      background-attachment: fixed; /* Fijar la imagen al fondo */
      background-color: #f8f9fa; /* Color de fondo de respaldo */
    }
    .card {
      border: 1px solid #d1d1d1; /* Borde de la tarjeta */
      border-radius: 10px; /* Esquinas redondeadas */
      box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1); /* Sombra */
    }
    .card-header {
      background-color: #cfcccc; /* Color de fondo del encabezado */
      color: white; /* Color de texto del encabezado */
      text-align: center; /* Centrado del texto */
      border-bottom: none; /* Sin borde inferior */
      border-top-left-radius: 10px; /* Esquina redondeada superior izquierda */
      border-top-right-radius: 10px; /* Esquina redondeada superior derecha */
      padding: 15px; /* Espaciado interno */
    }
    .card-body {
      padding: 20px; /* Espaciado interno */
    }
    .form-control {
      border: 1px solid #ced4da; /* Borde del campo de entrada */
    }
    .btn-primary {
      background-color: #007bff; /* Color de fondo del botón */
      border: none; /* Sin borde */
    }
    .btn-primary:hover {
      background-color: #0056b3; /* Color de fondo al pasar el mouse */
    }
    .btn-secondary {
      background-color: #6c757d; /* Color de fondo del botón secundario */
      border: none; /* Sin borde */
    }
    .btn-secondary:hover {
      background-color: #5a6268; /* Color de fondo al pasar el mouse */
    }
  </style>
</head>
<body style="background-image: url('fondo.png');">

  <div class="container-fluid">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h3>Login - Consultorio Médico</h3>
          </div>
          <div class="card-body">
            <form id="loginForm">
              <div class="form-group">
                <label for="correo">Correo</label>
                <input type="text" id="correo" name="correo" class="form-control" placeholder="Ingrese su correo" required>
              </div>
              <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
              </div>
              <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
              <a href="registro.html" class="btn btn-secondary btn-block">Registrarse</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS y dependencias opcionales (jQuery, Popper.js) -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <script>
    $(document).ready(function() {
      $('#loginForm').on('submit', function(event) {
        event.preventDefault();
        $.ajax({
          type: 'POST',
          url: 'login_usuario.php',
          data: $(this).serialize(),
          success: function(response) {
            if (response.trim() === 'Login exitoso') {
              window.location.href = 'inicio.php'; // Redirigir a la página de inicio después del login exitoso
            } else {
              alert('Error: ' + response);
            }
          }
        });
      });
    });
  </script>
</body>
</html>
